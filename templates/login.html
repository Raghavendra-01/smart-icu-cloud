<!DOCTYPE html>
<html>
<head>
<title>AI ICU Secure Access Portal</title>

<style>
body {
    margin:0;
    height:100vh;
    background:#0f141c;
    font-family: 'Courier New', monospace;
    color:#00ffff;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Animated grid background */
body::before {
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background-image: 
        linear-gradient(#00ffff22 1px, transparent 1px),
        linear-gradient(90deg, #00ffff22 1px, transparent 1px);
    background-size:50px 50px;
    animation: moveGrid 20s linear infinite;
}

@keyframes moveGrid {
    from { transform:translate(0,0); }
    to { transform:translate(-50px,-50px); }
}

.login-box {
    position:relative;
    background:#1c2331;
    padding:40px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 0 20px #00ffff88;
    animation: glow 2s infinite alternate;
    z-index:1;
}

@keyframes glow {
    from { box-shadow:0 0 10px #00ffff88; }
    to { box-shadow:0 0 30px #00ffff; }
}

h1 {
    margin-bottom:10px;
    color:#00ffff;
}

h3 {
    margin-bottom:25px;
    color:#00cccc;
    font-weight:normal;
}

input, select {
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#0f141c;
    border:1px solid #00ffff;
    border-radius:5px;
    color:#00ffff;
}

input:focus, select:focus {
    outline:none;
    box-shadow:0 0 10px #00ffff;
}

button {
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#00ffff;
    border:none;
    border-radius:5px;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    background:#00cccc;
    box-shadow:0 0 15px #00ffff;
}

.status {
    margin-top:20px;
    font-size:12px;
    color:#00ff99;
}

.footer {
    margin-top:15px;
    font-size:10px;
    color:#00aaaa;
}
</style>
</head>

<body>

<div class="login-box">

<h1>🏥 AI ICU MONITORING</h1>
<h3>Secure Access Portal</h3>

<form action="/login" method="POST">

<input type="text" name="username" placeholder="Enter Staff ID" required>

<input type="password" name="password" placeholder="Enter Password" required>

<select name="role" required>
    <option value="">Select Role</option>
    <option value="nurse">👩‍⚕️ Nurse</option>
    <option value="doctor">👨‍⚕️ Doctor</option>
    <option value="admin">🛡️ Admin</option>
    <option value="analytics">📊 Analytics</option>
</select>

<button type="submit">🔐 LOGIN</button>

</form>

<div class="status">
🟢 System Status: All Services Operational
</div>

<div class="footer">
PROJECT PRESENTED BY RAGHAVENDRA & DHANUSH
</div>

</div>

</body>
</html>
